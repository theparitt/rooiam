name: Publish Docker images

# Builds and pushes Rooiam's Docker images to the GitHub Container Registry
# (ghcr.io/<owner>/...). Runs when you push a version tag like `v0.1.0`, and
# can also be run manually from the Actions tab.
#
# After this finishes, the images are pullable, e.g.:
#   docker pull ghcr.io/theparitt/rooiam-server:0.1.0
#   docker pull ghcr.io/theparitt/rooiam-server:latest
#
# Then create a GitHub Release for the tag (Releases -> Draft a new release)
# and point its notes at these image tags.
#
# The server image is the primary artifact. The frontend images bake their
# API URL in at build time (VITE_API_URL), so a generic published frontend
# image is only useful for a demo/default API host — that's why they're
# opt-in via the `build_frontends` input.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_frontends:
        description: 'Also build the frontend images (admin/app/landing/docs)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ---- Server: the primary image, always built ----------------------------
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/rooiam-server
          # On a v1.2.3 tag this produces tags: 1.2.3, 1.2, and latest.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---- Frontends: opt-in (API URL is baked in at build time) --------------
  frontends:
    # Build on a version tag, or when manually requested with the toggle on.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.build_frontends
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rooiam-admin
            dockerfile: Dockerfile.admin
          - name: rooiam-app
            dockerfile: Dockerfile.app
          - name: rooiam-landing
            dockerfile: Dockerfile.landing
          - name: rooiam-docs
            dockerfile: Dockerfile.docs
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
