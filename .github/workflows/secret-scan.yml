name: Secret Scan

# Scans every push and pull request for committed secrets (passwords, tokens,
# API keys, DB connection strings). Fails the build if any are found, so a
# leaked credential is caught in CI before it can be merged or relied upon.
#
# This is the repo-side safety net. It complements (does not replace) GitHub's
# native Secret Scanning + Push Protection, which become available for free once
# the repository is public (Settings -> Code security and analysis).

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
