name: rooiam-demo

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ROOIAM_DEMO_DB_NAME?}
      POSTGRES_USER: ${ROOIAM_DEMO_DB_USER?}
      POSTGRES_PASSWORD: ${ROOIAM_DEMO_DB_PASSWORD?}
    ports:
      - "${ROOIAM_DEMO_POSTGRES_BIND?}:5432"
    volumes:
      - rooiam_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ROOIAM_DEMO_DB_USER?} -d ${ROOIAM_DEMO_DB_NAME?}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "${ROOIAM_DEMO_REDIS_BIND?}:6379"
    volumes:
      - rooiam_demo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ROOIAM_DEMO_MINIO_USER?}
      MINIO_ROOT_PASSWORD: ${ROOIAM_DEMO_MINIO_PASSWORD?}
    ports:
      - "${ROOIAM_DEMO_MINIO_BIND?}:9000"
      - "${ROOIAM_DEMO_MINIO_CONSOLE_BIND?}:9001"
    volumes:
      - rooiam_demo_minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/$$MINIO_BUCKET;
        mc anonymous set public local/$$MINIO_BUCKET;
        exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${ROOIAM_DEMO_MINIO_USER?}
      MINIO_ROOT_PASSWORD: ${ROOIAM_DEMO_MINIO_PASSWORD?}
      MINIO_BUCKET: ${ROOIAM_DEMO_MINIO_BUCKET?}

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${ROOIAM_DEMO_MAILHOG_SMTP_BIND?}:1025"
      - "${ROOIAM_DEMO_MAILHOG_UI_BIND?}:8025"

  demo-server:
    image: ghcr.io/theparitt/rooiam-demo-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    environment:
      ROOIAM_MODE: ${ROOIAM_MODE?}
      ROOIAM_DEPLOY_TARGET: ${ROOIAM_DEMO_DEPLOY_TARGET?}
      ROOIAM_HOST: ${ROOIAM_DEMO_HOST?}
      ROOIAM_PORT: ${ROOIAM_DEMO_PORT?}
      ROOIAM_COOKIE_SECURE: ${ROOIAM_DEMO_COOKIE_SECURE?}
      ROOIAM_COOKIE_DOMAIN: ${ROOIAM_DEMO_COOKIE_DOMAIN:-}
      ROOIAM_DOCS_URL: ${ROOIAM_DOCS_URL:-}
      ROOIAM_SERVER_URL: ${ROOIAM_DEMO_SERVER_URL?}
      ROOIAM_APP_URL: ${ROOIAM_DEMO_APP_URL?}
      ROOIAM_ENDUSER_URL: ${ROOIAM_DEMO_ENDUSER_URL?}
      ROOIAM_ADMIN_URL: ${ROOIAM_DEMO_ADMIN_URL?}
      ROOIAM_ALLOWED_ORIGINS: ${ROOIAM_DEMO_ALLOWED_ORIGINS?}
      ROOIAM_DATABASE_URL: ${ROOIAM_DEMO_DATABASE_URL?}
      ROOIAM_REDIS_URL: ${ROOIAM_DEMO_REDIS_URL?}
      ROOIAM_STORAGE_ROOT: ${ROOIAM_DEMO_STORAGE_ROOT?}
      ROOIAM_PUBLIC_MEDIA_BASE: ${ROOIAM_DEMO_PUBLIC_MEDIA_BASE?}
      ROOIAM_MINIO_ENDPOINT: ${ROOIAM_DEMO_MINIO_ENDPOINT?}
      ROOIAM_MINIO_BUCKET: ${ROOIAM_DEMO_MINIO_BUCKET?}
      ROOIAM_MINIO_USERNAME: ${ROOIAM_DEMO_MINIO_USER?}
      ROOIAM_MINIO_PASSWORD: ${ROOIAM_DEMO_MINIO_PASSWORD?}
      ROOIAM_DEMO_SMTP_HOST: ${ROOIAM_DEMO_SMTP_HOST?}
      ROOIAM_DEMO_SMTP_PORT: ${ROOIAM_DEMO_SMTP_PORT?}
      ROOIAM_DEMO_SMTP_FROM: ${ROOIAM_DEMO_SMTP_FROM?}
      ROOIAM_DEMO_MAILBOX_URL: ${ROOIAM_DEMO_MAILBOX_URL?}
      ROOIAM_DEMO_APP_URL: ${ROOIAM_DEMO_APP_URL?}
      ROOIAM_DEMO_ADMIN_URL: ${ROOIAM_DEMO_ADMIN_URL?}
      CANDYCLOUD_API_URL: ${ROOIAM_DEMO_CANDYCLOUD_API_URL?}
    ports:
      - "${ROOIAM_DEMO_SERVER_BIND?}:${ROOIAM_DEMO_PORT?}"
    volumes:
      - rooiam_demo_server_data:${ROOIAM_DEMO_STORAGE_ROOT?}

volumes:
  rooiam_demo_server_data:
  rooiam_demo_postgres_data:
  rooiam_demo_redis_data:
  rooiam_demo_minio_data:
